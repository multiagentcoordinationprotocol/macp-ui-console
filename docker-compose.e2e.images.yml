# Override: reuse pre-built local images instead of rebuilding from sibling
# source (which needs a private GitHub npm token). Runtime config still comes
# from docker-compose.e2e.yml's environment blocks.
#
# Usage:
#   docker compose -f docker-compose.e2e.yml -f docker-compose.e2e.images.yml up -d --wait

services:
  auth-service:
    build: !reset null
    image: macp-auth-service:0.1.3

  migrate:
    build: !reset null
    image: macp-control-plane:0.1.3

  macp-control-plane:
    build: !reset null
    image: macp-control-plane:0.1.3

  macp-playground:
    build: !reset null
    image: macp-playground:0.4.0
